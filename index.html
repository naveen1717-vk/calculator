<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scientific Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="calculator">

    <h2>Scientific Calculator</h2>

    <input type="text" id="display" readonly>

    <div class="buttons">

        <button onclick="clearDisplay()">C</button>
        <button onclick="deleteLast()">⌫</button>
        <button onclick="appendValue('%')">%</button>
        <button onclick="appendValue('/')">÷</button>

        <button onclick="sinValue()">sin</button>
        <button onclick="cosValue()">cos</button>
        <button onclick="tanValue()">tan</button>
        <button onclick="appendValue('*')">×</button>

        <button onclick="sqrtValue()">√</button>
        <button onclick="square()">x²</button>
        <button onclick="appendValue('(')">(</button>
        <button onclick="appendValue(')')">)</button>

        <button onclick="appendValue('7')">7</button>
        <button onclick="appendValue('8')">8</button>
        <button onclick="appendValue('9')">9</button>
        <button onclick="appendValue('-')">−</button>

        <button onclick="appendValue('4')">4</button>
        <button onclick="appendValue('5')">5</button>
        <button onclick="appendValue('6')">6</button>
        <button onclick="appendValue('+')">+</button>

        <button onclick="appendValue('1')">1</button>
        <button onclick="appendValue('2')">2</button>
        <button onclick="appendValue('3')">3</button>
        <button rowspan="2" onclick="calculate()">=</button>

        <button class="zero" onclick="appendValue('0')">0</button>
        <button onclick="appendValue('.')">.</button>

    </div>

    <div class="history">
        <h3>History</h3>
        <ul id="historyList"></ul>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
